name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  quality-gates:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Run local quality gates
        env:
          BACKEND_GATE_CLEANUP: "1"
        run: bash scripts/ci/all-gates.sh

      - name: Cleanup Compose services
        if: always()
        run: |
          docker compose down --remove-orphans || true
          docker compose -f docker-compose.prod.yml --env-file docs/deployment/.env.production.example down --remove-orphans || true
